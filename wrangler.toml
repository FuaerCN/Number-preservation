# 这个名字决定了你最终的 API 链接前缀，比如 https://esim-api.你的用户名.workers.dev
name = "esim-api"

# 明确告诉 Cloudflare 我们后端代码的准确路径
main = "worker/worker.js"
compatibility_date = "2024-05-31"

# 自动配置定时任务（每天 UTC 02:00，北京时间 10:00）
[triggers]
crons = ["0 2 * * *"]

# 自动绑定 KV 数据库
[[kv_namespaces]]
binding = "ESIM_DB"
id = "09fe63fac24744f9bc5ff6fbbb663666"
